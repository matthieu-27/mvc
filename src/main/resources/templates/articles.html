<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Article List</title>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet" />
    <script th:src="@{/js/bootstrap.min.js}"></script>
  </head>
  <body>
    <a th:href="@{/add}" class="card-heading">Add New Article</a>
    <div class="container">
      <div class="card card-primary">
        <div class="card-heading">Article list</div>
        <div class="card-body">
          <table class="table">
            <tr>
              <th>id</th>
              <th>brand</th>
              <th>description</th>
              <th>price</th>
            </tr>
            <tr th:each="article: ${articles}">
              <td th:text="${article.id}" />
              <td th:text="${article.brand}" />
              <td th:text="${article.description}" />
              <td th:text="${article.price}" />
            </tr>
          </table>
          <ul class="nav nav-pills">
            <li th:each="page, status: ${pages}" th:class="nav-item">
              <a
                th:href="@{/?(page=${status.index})}"
                th:text="${status.index}"
                th:class="${currentPage==status.index}?'nav-link active':'nav-link'"
              />
            </li>
          </ul>
        </div>
      </div>
    </div>
  </body>
</html>
