<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="layout"
>
  <head>
    <title>Article List</title>
  </head>
  <body>
    <div layout:fragment="content">
      <div class="card">
        <div class="card-body">
          <ul
            class="nav nav-pills d-inline-flex mb-3"
            th:each="category, status: ${categories}"
          >
            <li class="nav-item" th:if="${status.index.equals(0)}">
              <a
                class="nav-link active"
                aria-current="page"
                th:href="@{/?(page=${status.index},search=${search})}"
                >All categories
              </a>
            </li>
            <li class="nav-item">
              <a
                th:href="@{/?(search=${search},category=${category.getId()})}"
                th:text="${category.name}"
                th:class="${category.id==status.index}?'nav-link active':'nav-link'"
              />
            </li>
          </ul>

          <div
            class="card-title d-flex w-100 justify-content-between align-items-center"
          >
            <h4 class="h4">Article list</h4>
            <form th:action="@{/}" method="get">
              <label for="searchInput" class="card-subtitle">Search</label>
              <input
                id="searchInput"
                type="text"
                name="search"
                th:value="${search}"
              />
              <button type="submit" class="btn btn-primary">Search</button>
            </form>
          </div>

          <table class="table table-striped">
            <tr>
              <th>id</th>
              <th>brand</th>
              <th>description</th>
              <th>price</th>
              <th>delete</th>
            </tr>
            <tr th:each="article: ${articles}">
              <td th:text="${article.id}" />
              <td th:text="${article.brand}" />
              <td th:text="${article.description}" />
              <td th:text="${article.price}" />
              <td>
                <a
                  th:href="@{/delete(id=${article.id}, page=${currentPage}, search=${search})}"
                  class="btn btn-danger"
                  method="delete"
                  >Delete</a
                >
              </td>
            </tr>
          </table>
          <ul class="nav nav-pills">
            <li th:each="page, status: ${pages}" th:class="nav-item">
              <a
                th:href="@{/?(page=${status.index},search=${search})}"
                th:text="${status.index}"
                th:class="${currentPage==status.index}?'nav-link active':'nav-link'"
              />
            </li>
          </ul>
        </div>
      </div>
    </div>
  </body>
</html>
